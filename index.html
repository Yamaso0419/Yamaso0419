<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sota Yamagishi | Portfolio</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --accent-color: #38bdf8;
            --text-color: #f8fafc;
            --sub-text: #94a3b8;
        }

        body {
            margin: 0;
            font-family: 'Helvetica Neue', Arial, "Hiragino Kaku Gothic ProN", "Hiragino Sans", sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            line-height: 1.6;
        }

        .container {
            max-width: 600px;
            padding: 2rem;
            text-align: center;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 16px;
            background: rgba(30, 41, 59, 0.5);
            backdrop-filter: blur(10px);
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1);
        }

        .profile-name {
            font-size: 3rem;
            font-weight: 800;
            margin: 0;
            letter-spacing: 0.1em;
            background: linear-gradient(to right, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .profile-title {
            font-size: 1.1rem;
            color: var(--sub-text);
            margin-top: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.2em;
        }

        .divider {
            height: 2px;
            width: 50px;
            background-color: var(--accent-color);
            margin: 2rem auto;
        }

        .description {
            margin-bottom: 2rem;
            font-size: 1rem;
        }

        .skills {
            display: flex;
            justify-content: center;
            gap: 10px;
            flex-wrap: wrap;
            list-style: none;
            padding: 0;
        }

        .skill-tag {
            background: rgba(56, 189, 248, 0.1);
            border: 1px solid var(--accent-color);
            color: var(--accent-color);
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 0.85rem;
        }

        .contact-btn {
            display: inline-block;
            margin-top: 2rem;
            padding: 10px 24px;
            background-color: var(--accent-color);
            color: var(--bg-color);
            text-decoration: none;
            font-weight: bold;
            border-radius: 8px;
            transition: transform 0.2s ease;
        }

        .contact-btn:hover {
            transform: translateY(-3px);
            opacity: 0.9;
        }
    </style>
</head>
<body>

    <div class="container">
        <p class="profile-title">Creative Developer</p>
        <h1 class="profile-name">山岸 壮太</h1>
        <p style="color: var(--sub-text); margin-top: -5px;">Sota Yamagishi</p>
        
        <div class="divider"></div>

        <div class="description">
            <p>
                「シンプルであること」と「機能的であること」の両立を追求しています。<br>
                新しい技術に触れること、そしてそれを使って何かを形にすることが好きです。
            </p>
        </div>

        <ul class="skills">
            <li class="skill-tag">HTML5 / CSS3</li>
            <li class="skill-tag">JavaScript</li>
            <li class="skill-tag">UI Design</li>
            <li class="skill-tag">Problem Solving</li>
        </ul>

        <a href="mailto:your-email@example.com" class="contact-btn">GET IN TOUCH</a>
    </div>

</body>
</html>
